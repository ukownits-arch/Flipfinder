<!DOCTYPE html>

<html>

<head>

  <title>FlipFinder</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body {

      margin: 0;

      font-family: Arial;

      background: #0f172a;

      color: white;

      text-align: center;

    }

    .container {

      padding: 40px 20px;

    }

    input {

      padding: 10px;

      margin: 5px;

      border-radius: 5px;

      border: none;

    }

    button {

      padding: 10px 20px;

      background: #22c55e;

      border: none;

      color: white;

      border-radius: 5px;

      cursor: pointer;

    }

    .listing {

      background: #1e293b;

      margin: 10px auto;

      padding: 15px;

      border-radius: 8px;

      width: 80%;

      max-width: 400px;

    }

  </style>

</head>

<body>

  <div class="container">

    <h1>FlipFinder 🚀</h1>

    <p>Post items. Find deals. Flip for profit.</p>

    <h3>Sell an item</h3>

    <input id="itemName" placeholder="Item name">

    <input id="price" placeholder="Price">

    <br>

    <button onclick="addItem()">Post</button>

    <h3>Listings</h3>

    <div id="listings"></div>

  </div>

  <script>

    function addItem() {

      const name = document.getElementById("itemName").value;

      const price = document.getElementById("price").value;

      if (!name || !price) return;

      const listing = document.createElement("div");

      listing.className = "listing";

      listing.innerHTML = `<strong>${name}</strong><br>$${price}`;

      document.getElementById("listings").appendChild(listing);

      document.getElementById("itemName").value = "";

      document.getElementById("price").value = "";

    }

  </script>

</body>

</html>
