<!DOCTYPE html>

<html>

<head>

  <title>FlipFinder</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body {

      margin: 0;

      font-family: Arial, sans-serif;

      background: #0f172a;

      color: white;

      text-align: center;

    }

    .container {

      padding: 40px 20px;

    }

    h1 {

      font-size: 40px;

      margin-bottom: 10px;

    }

    input {

      padding: 10px;

      margin: 5px;

      border-radius: 5px;

      border: none;

      width: 120px;

    }

    button {

      padding: 10px 15px;

      background: #22c55e;

      border: none;

      border-radius: 5px;

      color: white;

      cursor: pointer;

    }

    .item {

      background: #1e293b;

      margin: 10px auto;

      padding: 10px;

      width: 200px;

      border-radius: 8px;

    }

  </style>

</head>
  https://ukownits-arch.github.io/Flipfinder/
<body>

  <div class="container">

    <h1>FlipFinder 🚀</h1>

    <p>Buy & sell anything</p>

    <input id="itemName" placeholder="Item name">

    <input id="price" placeholder="Price">

    <br>

    <button onclick="addItem()">Add Item</button>

    <div id="listings"></div>

  </div>

  <script>

    function loadItems() {

      let saved = [];

      try {

        saved = JSON.parse(localStorage.getItem("listings")) || [];

      } catch (e) {

        saved = [];

      }

      saved.forEach(item => displayItem(item.name, item.price));

    }

    function addItem() {

      const name = document.getElementById("itemName").value;

      const price = document.getElementById("price").value;

      if (!name || !price) return;

      const item = { name, price };

      let existing = [];

      try {

        existing = JSON.parse(localStorage.getItem("listings")) || [];

      } catch (e) {

        existing = [];

      }

      existing.push(item);

      localStorage.setItem("listings", JSON.stringify(existing));

      displayItem(name, price);

      document.getElementById("itemName").value = "";

      document.getElementById("price").value = "";

    }

    function displayItem(name, price) {

      const div = document.createElement("div");

      div.className = "item";

      div.innerHTML = `<strong>${name}</strong><br>$${price}`;

      document.getElementById("listings").appendChild(div);

    }

    window.onload = loadItems;

  </script>

</body>

</html>
