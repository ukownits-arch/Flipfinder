<!DOCTYPE html>

<html>

<head>

  <title>FlipFinder</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body {

      font-family: Arial;

      background: #f2f2f2;

      text-align: center;

    }

    .container {

      padding: 20px;

    }

    input, button {

      padding: 10px;

      margin: 5px;

      width: 80%;

      max-width: 300px;

    }

    button {

      background: black;

      color: white;

      border: none;

      border-radius: 5px;

    }

    .item {

      background: white;

      margin: 15px auto;

      padding: 10px;

      border-radius: 10px;

      width: 90%;

      max-width: 400px;

    }

    img {

      width: 100%;

      border-radius: 10px;

    }

  </style>

</head>

<body>

<div class="container">

  <h1>🚀 FlipFinder</h1>

  <p>Buy & sell anything</p>

  <input id="itemName" placeholder="Item name"><br>

  <input id="price" placeholder="Price"><br>

  <input type="file" id="imageInput" accept="image/*"><br>

  <button onclick="addItem()">Add Listing</button>

  <div id="listings"></div>

</div>

<!-- ✅ ONE SCRIPT BLOCK (THIS FIXES YOUR ERROR) -->

<script type="module">

// 🔥 Firebase (ready but optional right now)

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";

const firebaseConfig = {

  apiKey: "AIzaSyADf9zrMII5ab7kcrjyXxYPRIe2KASyzh0",

  authDomain: "flipfinder-24f82.firebaseapp.com",

  projectId: "flipfinder-24f82",

  storageBucket: "flipfinder-24f82.firebasestorage.app",

  messagingSenderId: "75492891444",

  appId: "1:75492891444:web:9953ddbea56902ac332361",

  measurementId: "G-MT3WMR0TQP"

};

// Initialize Firebase

const app = initializeApp(firebaseConfig);

const analytics = getAnalytics(app);

// ➕ ADD ITEM

window.addItem = function() {

  const name = document.getElementById("itemName").value;

  const price = document.getElementById("price").value;

  const file = document.getElementById("imageInput").files[0];

  if (!name || !price || !file) {

    alert("Fill everything!");

    return;

  }

  const reader = new FileReader();

  reader.onload = function(e) {

    const item = {

      name: name,

      price: price,

      image: e.target.result

    };

    saveItem(item);

    displayItem(item);

  };

  reader.readAsDataURL(file);

};

// 🖼 DISPLAY ITEM

function displayItem(item) {

  const div = document.createElement("div");

  div.className = "item";

  div.innerHTML = `

    <h3>${item.name}</h3>

    <p>£${item.price}</p>

    <img src="${item.image}">

  `;

  document.getElementById("listings").appendChild(div);

}

// 💾 SAVE ITEM (LOCAL STORAGE)

function saveItem(item) {

  const existing = JSON.parse(localStorage.getItem("listings")) || [];

  existing.push(item);

  localStorage.setItem("listings", JSON.stringify(existing));

}

// 🔄 LOAD ITEMS

function loadItems() {

  const saved = JSON.parse(localStorage.getItem("listings")) || [];

  saved.forEach(item => displayItem(item));

}

window.onload = loadItems;

</script>

</body>

</html>
