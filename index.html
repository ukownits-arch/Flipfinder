<!DOCTYPE html>

<html>

<head>

  <title>FlipFinder</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body {

      margin: 0;

      font-family: Arial, sans-serif;

      background: #0f172a;

      color: white;

      text-align: center;

    }

    .container {

      padding: 80px 20px;

    }

    h1 {

      font-size: 50px;

      margin-bottom: 10px;

    }

    p {

      font-size: 18px;

      color: #cbd5e1;

    }

    .btn {

      margin-top: 25px;

      padding: 12px 25px;

      font-size: 16px;

      border: none;

      border-radius: 6px;

      background: #22c55e;

      color: white;

      cursor: pointer;

    }

    .btn:hover {

      background: #16a34a;

    }

    .features {

      margin-top: 60px;

    }

    .feature {

      margin: 20px 0;

    }

  </style>

</head>

<body>

  <div class="container">

    <h1>FlipFinder 🚀</h1>

    <p>Find the best deals. Flip smarter. Make money.</p>

    <button class="btn">Get Started</button>

    <div class="features">

      <div class="feature">🔥 Find underpriced items instantly</div>

      <div class="feature">📊 Analyze profit potential</div>

      <div class="feature">⚡ Flip faster than everyone else</div>

    </div>

  </div>

</body>

</html>
