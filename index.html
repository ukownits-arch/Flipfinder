<script>

  // Load saved items when page opens

  window.onload = function() {

    const saved = JSON.parse(localStorage.getItem("listings")) || [];

    saved.forEach(item => displayItem(item.name, item.price));

  };

  function addItem() {

    const name = document.getElementById("itemName").value;

    const price = document.getElementById("price").value;

    if (!name || !price) return;

    const item = { name, price };

    // Save to localStorage

    const existing = JSON.parse(localStorage.getItem("listings")) || [];

    existing.push(item);

    localStorage.setItem("listings", JSON.stringify(existing));

    displayItem(name, price);

    document.getElementById("itemName").value = "";

    document.getElementById("price").value = "";

  }

  function displayItem(name, price) {

    const listing = document.createElement("div");

    listing.className = "listing";

    listing.innerHTML = `<strong>${name}</strong><br>$${price}`;

    document.getElementById("listings").appendChild(listing);

  }

</script>
